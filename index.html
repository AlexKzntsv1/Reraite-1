<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpellChecker PRO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: #2c3e50; }
        textarea { width: 100%; height: 200px; padding: 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; font-family: inherit; resize: vertical; box-sizing: border-box; }
        textarea:focus { border-color: #007bff; outline: none; }
        .controls { margin-top: 15px; display: flex; gap: 10px; }
        button, .btn { padding: 12px 24px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; border-radius: 6px; text-decoration: none; display: inline-block; transition: background 0.2s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }
        .btn-primary:disabled { background: #a0c4ff; cursor: not-allowed; }
        .btn-clear { background: #e2e6ea; color: #495057; }
        .btn-clear:hover { background: #dae0e5; }
        .stats { margin-bottom: 15px; font-size: 14px; color: #6c757d; }
        .status-bar { margin-top: 25px; padding: 15px; border-radius: 8px; font-weight: 600; }
        .success { background-color: #d4edda; color: #155724; }
        .warning { background-color: #fff3cd; color: #856404; }
        .error { background-color: #f8d7da; color: #721c24; }
        .result-box { margin-top: 20px; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; background: #fff; white-space: pre-wrap; line-height: 1.6; font-size: 16px; }
        .unknown { background-color: #ffcccc; color: #c00; border-bottom: 2px solid #f00; padding: 0 2px; border-radius: 3px; }
        #loader { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔍 Проверка орфографии</h2>
        <div class="stats" id="loader">⏳ Загрузка словарей (0/15)...</div>
        
        <textarea id="text_input" placeholder="Вставьте текст сюда..."></textarea>
        <div class="controls">
            <button id="check_btn" class="btn-primary" disabled>Проверить</button>
            <button id="clear_btn" class="btn-clear">Очистить</button>
        </div>

        <div id="status_container"></div>
        <div id="result_box" class="result-box" style="display: none;"></div>
    </div>

    <script>
        const VOCABULARY = new Set();
        
        // --- 1. Асинхронная параллельная загрузка словарей ---
        async function loadDictionaries() {
            const dictFiles = [
                './dictionaries/tm.txt',
                './dictionaries/ral_i_rr.txt',
                './dictionaries/russian.txt',
                './dictionaries/russian_4.txt',
                './dictionaries/orfoepicheskij_slovar_words2_1.txt',
                './dictionaries/orfograficheskij_slovar_words1_1.txt',
                './dictionaries/allin.txt',
                './dictionaries/tolkovyj_slovar_chast1_a_n_words_1.txt',
                './dictionaries/sklonenia_5.txt',
                './dictionaries/sklonenia_4.txt',
                './dictionaries/sklonenia_1.txt',
                './dictionaries/slovar_inostr_slov_words_1.txt',
                './dictionaries/tolkovyj_slovar_chast2_o_ja_words_1.txt',
                './dictionaries/sklonenia_2.txt',
                './dictionaries/sklonenia_3.txt'
            ];

            const loaderElement = document.getElementById('loader');
            let loadedCount = 0;

            try {
                // Запускаем загрузку всех файлов параллельно
                const fetchPromises = dictFiles.map(file => 
                    fetch(file).then(res => {
                        if (!res.ok) throw new Error(`Файл не найден: ${file}`);
                        loadedCount++;
                        loaderElement.innerHTML = `⏳ Загрузка словарей (${loadedCount}/${dictFiles.length})...`;
                        return res.text();
                    })
                );

                // Ждем завершения загрузки
                const filesTexts = await Promise.all(fetchPromises);
                
                loaderElement.innerHTML = `⏳ Обработка слов...`;

                // Собираем все слова в Set
                for (const text of filesTexts) {
                    const lines = text.split('\n');
                    for (let line of lines) {
                        const word = line.trim().toLowerCase();
                        if (word) VOCABULARY.add(word);
                    }
                }
                
                loaderElement.innerHTML = `Загружено слов: <strong>${VOCABULARY.size.toLocaleString('ru-RU')}</strong>`;
                document.getElementById('check_btn').disabled = false; // Включаем кнопку
                document.getElementById('check_btn').innerText = "Проверить";
                
            } catch (error) {
                loaderElement.innerHTML = `<span style="color: #dc3545;">❌ Ошибка загрузки: ${error.message}. Проверьте пути к файлам.</span>`;
            }
        }

        // Запускаем загрузку при открытии страницы
        loadDictionaries();

        // --- 2. Логика проверки ---
        document.getElementById('check_btn').addEventListener('click', () => {
            const inputText = document.getElementById('text_input').value;
            if (!inputText) return;

            let unknownCount = 0;
            const processedTokens = [];
            
            // Разбиваем текст с сохранением разделителей (пробелы, знаки препинания)
            const tokens = inputText.split(/([^a-zA-Zа-яА-ЯёЁ0-9-]+)/);

            for (const token of tokens) {
                if (!token) continue;
                
                // Если токен содержит буквы - проверяем его
                if (/[a-zA-Zа-яА-ЯёЁ]/.test(token)) {
                    const cleanWord = token.toLowerCase().trim();
                    
                    if (VOCABULARY.has(cleanWord)) {
                        processedTokens.push(token);
                    } else if (cleanWord.includes('-')) {
                        // Обработка слов с дефисом
                        const parts = cleanWord.split('-');
                        let allPartsExist = true;
                        
                        for (const part of parts) {
                            if (!part) continue;
                            if (!VOCABULARY.has(part)) {
                                allPartsExist = false;
                                break;
                            }
                        }
                        
                        if (allPartsExist) {
                            processedTokens.push(token);
                        } else {
                            processedTokens.push(`<span class="unknown">${token}</span>`);
                            unknownCount++;
                        }
                    } else {
                        processedTokens.push(`<span class="unknown">${token}</span>`);
                        unknownCount++;
                    }
                } else {
                    // Знаки препинания и пробелы оставляем как есть
                    processedTokens.push(token);
                }
            }

            // Вывод результатов
            const statusContainer = document.getElementById('status_container');
            const resultBox = document.getElementById('result_box');
            
            if (unknownCount === 0) {
                statusContainer.innerHTML = '<div class="status-bar success">✅ Идеально! Неизвестных слов не найдено.</div>';
            } else {
                statusContainer.innerHTML = `<div class="status-bar warning">⚠️ Найдено неизвестных слов: ${unknownCount}</div>`;
            }
            
            resultBox.innerHTML = processedTokens.join('');
            resultBox.style.display = 'block';
        });

        // Очистка
        document.getElementById('clear_btn').addEventListener('click', () => {
            document.getElementById('text_input').value = '';
            document.getElementById('status_container').innerHTML = '';
            document.getElementById('result_box').style.display = 'none';
            document.getElementById('text_input').focus();
        });
    </script>
</body>
</html>
